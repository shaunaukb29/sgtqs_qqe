<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Seas App</title>
  <style>
    html, body { margin:0; padding:0; height:100%; width:100%; font-family:sans-serif; background:#0f1117; color:#fff; }
    .gradio-wrapper { width:100%; height:100%; display:flex; justify-content:center; align-items:center; }
    gradio-app { width:100%; height:100%; border:none; }
  </style>
</head>
<body>
  <div class="gradio-wrapper">
    <gradio-app space="x748873y/sfss511"></gradio-app>
  </div>
  <script type="module" src="https://gradio.s3-us-west-2.amazonaws.com/5.38.0/gradio.js"></script>
  <script>
  function injectFooterHide(root) {
    if (root.querySelector('#gradio-footer-style')) return; // already injected
    const style = document.createElement('style');
    style.id = 'gradio-footer-style';
    style.textContent = `
      footer { display: none !important; }
      .built-with { display: none !important; }
      #footer { display: none !important; }
    `;
    root.appendChild(style);
  }

  function watchApp() {
    const app = document.querySelector('gradio-app');
    if (!app) { setTimeout(watchApp, 300); return; }

    const observer = new MutationObserver(() => {
      const root = app.shadowRoot;
      if (root) injectFooterHide(root);
    });

    observer.observe(app, { childList: true, subtree: true });

    // Also try immediately in case shadow root already exists
    if (app.shadowRoot) injectFooterHide(app.shadowRoot);
  }

  watchApp();
</script>
</body>
</html>
